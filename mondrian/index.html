<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#f4f1e8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Mondrian" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Mondrian Infinite Canvas Prototype</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/icon-512.png" type="image/png" />
  <link rel="apple-touch-icon" href="./assets/icon-512.png" />
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
<div id="app">
  <canvas id="stage"></canvas>
  <nav id="toolbar" aria-label="Tools">
    <button type="button" data-tool="split-v" class="tool-button tool-split-v active" aria-label="Split vertically"></button>
    <button type="button" data-tool="split-h" class="tool-button tool-split-h" aria-label="Split horizontally"></button>
    <button type="button" data-tool="paint-white" class="tool-button tool-fill tool-fill-white" aria-label="Fill white"></button>
    <button type="button" data-tool="paint-yellow" class="tool-button tool-fill tool-fill-yellow" aria-label="Fill yellow"></button>
    <button type="button" data-tool="paint-blue" class="tool-button tool-fill tool-fill-blue" aria-label="Fill blue"></button>
    <button type="button" data-tool="paint-red" class="tool-button tool-fill tool-fill-red" aria-label="Fill red"></button>
    <button type="button" data-action="undo" class="tool-button tool-undo" aria-label="Undo"><span aria-hidden="true"></span></button>
    <button type="button" data-action="redo" class="tool-button tool-redo" aria-label="Redo"><span aria-hidden="true"></span></button>
    <button type="button" data-action="clear" class="tool-button tool-clear" aria-label="Clear"></button>
  </nav>
</div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
